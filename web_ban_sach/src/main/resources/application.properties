spring.application.name=web_ban_sach

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

spring.jpa.properties.hibernate.auto_quote_keyword=true

spring.data.web.pageable.default-page-size=10

spring.data.web.pageable.one-indexed-parameters=true

spring.data.web.pageable.page-parameter=page

spring.data.web.pageable.size-parameter=size

spring.data.web.sort.sort-parameter=sort

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttl.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#JWT
app.auth.tokenSecret=${TOKEN_SECRET}
#theo mili giay
app.auth.tokenExpiration=12000
app.auth.tokenRefreshExpiration=600000

#Cau hinh cho VnPay (Sandbox : thu nghiem)
vnp.payUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnp.returnUrl=http://localhost:3000/vnpay-return
vnp.tmnCode=${VNP_TMNCODE}
vnp.hashSecret=${VNP_HASHSECRET}
vnp.apiUrl=https://sandbox.vnpayment.vn/merchantv2/

#Oauth2
spring.security.oauth2.client.registration.google.client-id=${CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile